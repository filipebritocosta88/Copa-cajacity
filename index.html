<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa CajaCity | Elite eSports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; --gold-dark: #8a6d3b;
            --bg: #020305; --card: #0a0c10;
            --neon-blue: #00e5ff; --divine-green: #008f11;
            --glass: rgba(255, 255, 255, 0.03); --text: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- LOGO DINÂMICA --- */
        .header-brand { text-align: center; padding: 10px; border-bottom: 1px solid var(--divine-green); background: #000; }
        .brand-top { font-size: 0.7rem; letter-spacing: 6px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .brand-mid { font-size: 2.4rem; font-weight: 900; background: linear-gradient(135deg, #fff 20%, var(--primary) 50%, var(--neon-blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.9; filter: drop-shadow(0 0 10px rgba(0,229,255,0.3)); }
        .brand-bottom { font-size: 0.65rem; color: var(--neon-blue); margin-top: 5px; font-weight: 600; text-shadow: 0 0 5px var(--neon-blue); }

        /* --- UI PREMIUM --- */
        main { height: calc(100vh - 170px); overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(0,143,17,0.2); position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--neon-blue); 
            padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .btn-glow { 
            background: linear-gradient(135deg, var(--gold-dark), var(--primary)); border:none; padding: 16px; border-radius: 12px; width: 100%; 
            font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(212,175,55,0.4);
        }

        /* --- MATA MATA BRAQUETE --- */
        .bracket-container { display: flex; flex-direction: column; gap: 15px; padding: 10px 0; }
        .phase-title { color: var(--neon-blue); font-size: 0.6rem; letter-spacing: 2px; text-align: center; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; }
        .match-card { background: #111; border: 1px solid var(--divine-green); border-radius: 15px; padding: 12px; position: relative; }
        .match-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        .match-team.winner { color: var(--primary); font-weight: 800; text-shadow: 0 0 10px var(--primary); }

        /* --- PLACAR CONTROLS --- */
        .score-box { display: flex; align-items: center; gap: 8px; background: #000; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--neon-blue); }
        .score-btn { background: none; border: none; color: var(--neon-blue); font-size: 1.2rem; padding: 5px; }
        .score-val { font-weight: 900; font-size: 1.2rem; min-width: 20px; text-align: center; }

        /* --- CHAT --- */
        #chat-window { position: fixed; bottom: 95px; right: 20px; width: 320px; height: 0; background: #0a0c10; border: 1px solid var(--neon-blue); border-radius: 25px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; z-index: 1000; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        #chat-window.open { height: 450px; opacity: 1; pointer-events: all; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; scrollbar-width: none; }
        .chat-bubble-btn { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #000; box-shadow: 0 5px 20px var(--primary); z-index: 1001; }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--divine-green); padding-bottom: 10px; }
        .nav-link { color: #444; font-size: 0.65rem; font-weight: 800; text-align: center; }
        .nav-link.active { color: var(--neon-blue); }
        .nav-link i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="header-brand">
                <div class="brand-top">COPA</div>
                <div class="brand-mid">CAJACITY</div>
            </div>
            <div style="margin-top: 50px;">
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ENTRAR NO CAMPO</button>
                <p onclick="toggleAuth('reg')" style="text-align: center; margin-top: 30px; color: var(--neon-blue);">REGISTRAR NOVO ATLETA</p>
            </div>
        </div>
        <div id="screen-reg" class="hidden" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="color:var(--primary); text-align:center; margin-bottom:30px;">NOVA CONTA</h2>
            <input type="text" id="r-nick" placeholder="Nick/Nome">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha">
            <button class="btn-glow" onclick="doRegister()">CRIAR CONTA</button>
            <p onclick="toggleAuth('login')" style="text-align:center; margin-top:20px;">JÁ SOU ATLETA</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header style="padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid #111;">
            <div class="header-brand" style="border:none; padding:0; text-align: left;">
                <div class="brand-top" style="font-size: 0.4rem; letter-spacing: 2px;">COPA</div>
                <div class="brand-mid" style="font-size: 1.3rem;">CAJACITY</div>
                <div id="live-clock" class="brand-bottom"></div>
            </div>
            <div id="u-avatar" onclick="openSettings()" style="width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--neon-blue); background-size: cover; box-shadow: 0 0 15px rgba(0,229,255,0.4);"></div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h4 style="color:var(--primary); margin-bottom: 15px; font-weight: 800;">GERAR TORNEIO</h4>
                    <input type="text" id="c-nome" placeholder="Nome da Copa">
                    <select id="c-tipo">
                        <option value="liga">PONTOS CORRIDOS (LIGA)</option>
                        <option value="mata">MATA-MATA (ELIMINATÓRIAS)</option>
                    </select>
                    <button class="btn-glow" onclick="createCopa()">LANÇAR DESAFIO</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-header" style="margin-bottom: 20px;"></div>
                <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                    <button class="btn-glow" style="padding: 12px; font-size: 0.65rem;" onclick="switchArena('tabela')">RESUMO</button>
                    <button class="btn-glow" style="padding: 12px; font-size: 0.65rem;" onclick="switchArena('jogos')">CONFRONTOS</button>
                    <button id="btn-manage" class="btn-glow hidden" style="padding: 12px; font-size: 0.65rem; background: #111; color: #fff; border: 1px solid var(--divine-green);" onclick="switchArena('manage')">GERIR</button>
                </div>
                <div id="arena-content"></div>
            </div>
        </main>

        <div id="chat-window">
            <div style="padding: 15px; background: #111; border-bottom: 1px solid var(--neon-blue); font-weight: 800; color: var(--neon-blue); display: flex; justify-content: space-between;">
                CHAT GLOBAL <i class="fas fa-times" onclick="toggleChat()"></i>
            </div>
            <div id="chat-msgs"></div>
            <div style="padding: 12px; display: flex; gap: 8px; background: #000;">
                <input type="text" id="chat-input" placeholder="Diga algo..." style="margin:0; flex:1; padding: 10px;">
                <button onclick="sendMsg()" style="background: var(--neon-blue); border:none; padding: 10px 15px; border-radius: 10px; color: #000;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="chat-bubble-btn" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>

        <div id="modal-settings" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px;">
            <h2 style="color:var(--primary); margin-bottom:30px;">MEU PERFIL</h2>
            <input type="text" id="set-nick" placeholder="Mudar Nick">
            <input type="text" id="set-foto" placeholder="URL da Foto do Avatar">
            <button class="btn-glow" onclick="saveSettings()">SALVAR ALTERAÇÕES</button>
            <button class="btn-glow" style="margin-top:15px; background:#111; color:#fff; border:1px solid #333;" onclick="closeSettings()">VOLTAR</button>
            <button class="btn-glow" style="margin-top:40px; background:#400; color:#fff;" onclick="doLogout()">DESLOGAR</button>
        </div>

        <div id="modal-profile" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px; text-align: center;">
            <div id="prof-avatar" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--neon-blue); margin: 0 auto 20px; background-size:cover; background-position:center;"></div>
            <h2 id="prof-nick" style="color:var(--primary); text-transform: uppercase; letter-spacing: 2px;"></h2>
            <div id="prof-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:25px;"></div>
            <button class="btn-glow" style="margin-top:30px;" onclick="document.getElementById('modal-profile').classList.add('hidden')">FECHAR</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-users"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
