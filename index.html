<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa Cajacity | Metasboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg: #080a0c;
            --card: #12161b; --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff; --text-dim: #a0a0a0;
            --grad: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            --danger: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- AUTH SCREENS --- */
        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
        .logo-main { font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; text-align: center; margin-bottom: 5px; }
        .logo-accent { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* --- APP HEADER --- */
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(8, 10, 12, 0.85); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass);
        }
        .user-pill { 
            background: var(--card); padding: 5px 12px; border-radius: 20px; 
            display: flex; align-items: center; gap: 8px; border: 1px solid var(--glass); cursor: pointer;
        }
        .avatar-box { width: 28px; height: 28px; border-radius: 50%; background: var(--grad); }

        /* --- SIDEBAR PERFIL --- */
        #profile-sidebar {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: var(--card); z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 25px; box-shadow: -20px 0 50px rgba(0,0,0,0.9);
        }
        #profile-sidebar.active { right: 0; }
        .close-sidebar { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: var(--text-dim); }

        /* --- CARDS & UI --- */
        .card { 
            background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px;
            border: 1px solid var(--glass); position: relative;
        }
        .btn-main { 
            background: var(--grad); border: none; padding: 16px; border-radius: 14px;
            width: 100%; font-weight: 800; color: #000; cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        
        input, select, textarea { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #2a2f3a; 
            padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 12px; font-size: 1rem;
        }

        /* --- CHAT FLUTUANTE --- */
        #chat-trigger {
            position: fixed; bottom: 95px; right: 20px; width: 56px; height: 56px;
            background: var(--grad); border-radius: 28px; display: flex; align-items: center;
            justify-content: center; font-size: 1.4rem; color: #000; z-index: 99; box-shadow: 0 8px 20px rgba(0,255,136,0.3);
        }
        #chat-box {
            position: fixed; bottom: 95px; right: 20px; width: 320px; height: 450px;
            background: var(--card); border-radius: 20px; z-index: 101; display: none;
            flex-direction: column; border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(18, 22, 27, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--glass); padding-bottom: 15px; z-index: 90;
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 5px; }

        /* --- TABELAS --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; padding: 10px; }
        td { padding: 15px 10px; text-align: center; border-bottom: 1px solid var(--glass); }
        .pos { font-weight: 800; color: var(--secondary); }
    </style>
</head>
<body>

    <div id="view-auth" class="auth-container">
        <h1 class="logo-main">COPA <span class="logo-accent">CAJACITY</span></h1>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 40px; font-size: 0.9rem;">Metasboard Experience</p>
        
        <div id="auth-login">
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-main" onclick="handleLogin()">ENTRAR NA ARENA</button>
            <p onclick="toggleAuth(true)" style="text-align:center; margin-top:20px; font-size:0.85rem">Novo por aqui? <span class="logo-accent">Criar Nick</span></p>
        </div>

        <div id="auth-reg" class="hidden">
            <input type="text" id="reg-nick" placeholder="Seu Nick">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Senha (mín. 6)">
            <button class="btn-main" onclick="handleRegister()">CRIAR CONTA</button>
            <p onclick="toggleAuth(false)" style="text-align:center; margin-top:20px; font-size:0.85rem">Já tem conta? <span class="logo-accent">Fazer Login</span></p>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <header>
            <div style="font-weight: 800; font-size: 1.1rem;">COPA <span class="logo-accent">CAJACITY</span></div>
            <div class="user-pill" onclick="toggleSidebar(true)">
                <span id="header-nick">---</span>
                <div class="avatar-box" id="header-avatar"></div>
            </div>
        </header>

        <div id="profile-sidebar">
            <div class="close-sidebar" onclick="toggleSidebar(false)"><i class="fas fa-times"></i></div>
            <h2 style="margin-bottom: 30px;">Meu Perfil</h2>
            <div style="text-align: center; margin-bottom: 30px;">
                <div id="profile-avatar-large" style="width: 80px; height: 80px; border-radius: 50%; background: var(--grad); margin: 0 auto 15px; border: 3px solid #333; background-size: cover;"></div>
                <h3 id="profile-name-display">Nick</h3>
            </div>
            <label>Link da Foto:</label>
            <input type="text" id="edit-avatar" placeholder="URL da imagem">
            <label>Alterar Nick:</label>
            <input type="text" id="edit-nick" placeholder="Novo Nick">
            <button class="btn-main" onclick="updateProfile()">SALVAR</button>
            <button class="btn-main" onclick="handleLogout()" style="margin-top: 30px; background: #1e2229; color: var(--danger);">SAIR DA CONTA</button>
        </div>

        <main style="padding: 20px; padding-bottom: 120px;">
            <div id="tab-lobby" class="tab-content">
                <h3 style="margin-bottom: 20px;">Lobby Online</h3>
                <div id="online-list"></div>
            </div>

            <div id="tab-comp" class="tab-content hidden">
                <div class="card">
                    <h4>Criar Novo Campeonato</h4>
                    <input type="text" id="new-cp-name" placeholder="Nome da Copa">
                    <select id="new-cp-type">
                        <option value="liga">Pontos Corridos</option>
                        <option value="champions">Liga + Mata-Mata</option>
                    </select>
                    <textarea id="new-cp-rules" placeholder="Regras (Ex: 5min, Times Livres...)"></textarea>
                    <button class="btn-main" onclick="createNewCamp()">LANÇAR NOVO</button>
                </div>
                <div id="camps-list"></div>
            </div>

            <div id="tab-arena" class="tab-content hidden">
                <div id="arena-active-content">
                    <p style="text-align:center; color: var(--text-dim); margin-top: 50px;">Selecione um campeonato na aba Copas.</p>
                </div>
            </div>
        </main>

        <div id="chat-trigger" onclick="toggleChat(true)"><i class="fas fa-comment-dots"></i></div>
        <div id="chat-box">
            <div style="padding: 15px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between;">
                <span style="font-weight: 800;">GLOBAL CHAT</span>
                <i class="fas fa-chevron-down" onclick="toggleChat(false)" style="cursor:pointer"></i>
            </div>
            <div id="chat-msgs" style="flex:1; overflow-y:auto; padding: 15px; font-size: 0.85rem;"></div>
            <div style="padding: 10px; display: flex; gap: 8px;">
                <input type="text" id="chat-input" placeholder="Sua mensagem..." style="margin-bottom:0">
                <button onclick="sendMsg()" style="background: var(--primary); border:none; border-radius:10px; padding:0 15px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('lobby', this)"><i class="fas fa-users"></i>LOBBY</div>
            <div class="nav-item" onclick="switchTab('comp', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-item" onclick="switchTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
