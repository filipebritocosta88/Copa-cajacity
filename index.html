<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa Cajacyte | Elite eSports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #d4af37; --primary-light: #f9e295; --bg: #050505;
            --card: #121212; --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff; --text-dim: #a0a0a0;
            --grad: linear-gradient(135deg, #d4af37 0%, #8a6d3b 100%);
            --danger: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- INPUTS TECNOLÓGICOS --- */
        input, select { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2); 
            padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 12px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(212,175,55,0.05); }

        /* --- LOGO ANIMADA --- */
        .logo-container { text-align: center; perspective: 1000px; }
        .logo-main { 
            font-weight: 900; font-size: 2.2rem; letter-spacing: -2px; line-height: 0.9;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: logo-glow 3s infinite alternate;
        }
        @keyframes logo-glow { from { filter: drop-shadow(0 0 2px var(--primary)); } to { filter: drop-shadow(0 0 15px var(--primary)); } }

        /* --- UI COMPONENTS --- */
        main { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass); position: relative; }
        .btn-glow { 
            background: var(--grad); border:none; padding: 16px; border-radius: 14px; width: 100%; 
            font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-glow:active { transform: scale(0.98); }

        /* --- CHAT EXPANSÍVEL --- */
        #chat-wrapper { position: fixed; bottom: 95px; right: 20px; z-index: 999; display: flex; flex-direction: column; align-items: flex-end; }
        #chat-box { 
            width: 320px; height: 0; background: var(--card); border: 1px solid var(--primary); 
            border-radius: 20px; overflow: hidden; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; opacity: 0; pointer-events: none; margin-bottom: 15px;
        }
        #chat-box.open { height: 450px; opacity: 1; pointer-events: all; }
        #chat-bubble { width: 60px; height: 60px; background: var(--grad); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- JOGOS & TABELA --- */
        .match-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--glass); }
        .score-box { background: #000; padding: 10px 20px; border-radius: 12px; font-weight: 800; color: var(--primary); border: 1px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { color: var(--text-dim); padding-bottom: 12px; border-bottom: 1px solid var(--glass); }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); z-index: 100; }
        .nav-link { color: #444; font-size: 0.65rem; font-weight: 800; text-align: center; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* --- SORTEIO --- */
        #overlay-sorteio { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ball { width: 80px; height: 80px; background: var(--grad); border-radius: 50%; animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% {transform: translateY(0)} 50% {transform: translateY(-20px)} }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" class="page" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="logo-container">
                <div class="logo-main">COPA<br>CAJACYTE</div>
                <p style="color: var(--text-dim); margin-top: 10px; font-size: 0.8rem; letter-spacing: 3px;">ELITE LEAGUE</p>
            </div>
            <div style="margin-top: 50px;">
                <input type="email" id="l-email" placeholder="Seu e-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ENTRAR NO CAMPO</button>
                <p onclick="toggleAuth('reg')" style="text-align: center; margin-top: 25px; color: var(--text-dim);">Novo aqui? <span style="color: var(--primary);">Criar Conta</span></p>
            </div>
        </div>
        <div id="screen-reg" class="page hidden" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="margin-bottom: 30px; text-align: center;">NOVO ATLETA</h2>
            <input type="text" id="r-nick" placeholder="Como quer ser chamado?">
            <input type="email" id="r-email" placeholder="Seu melhor e-mail">
            <input type="password" id="r-pass" placeholder="Crie uma senha">
            <button class="btn-glow" onclick="doRegister()">FINALIZAR CADASTRO</button>
            <p onclick="toggleAuth('login')" style="text-align: center; margin-top: 25px; color: var(--text-dim);">Já tenho conta</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #080808;">
            <div class="logo-main" style="font-size: 1rem;">COPA CAJACYTE</div>
            <div id="u-avatar" onclick="openSettings()" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); background-size: cover; box-shadow: 0 0 15px var(--primary);"></div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h4 style="margin-bottom: 15px; color: var(--primary);">CRIAR CAMPEONATO</h4>
                    <input type="text" id="c-nome" placeholder="Nome da Copa">
                    <select id="c-tipo">
                        <option value="liga">Liga (Pontos Corridos)</option>
                        <option value="mata">Mata-Mata (Chaveamento)</option>
                    </select>
                    <button class="btn-glow" onclick="createCopa()">LANÇAR TORNEIO</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-header" style="text-align: center; margin-bottom: 20px;"></div>
                <div style="display: flex; gap: 5px; margin-bottom: 20px;" id="arena-tabs">
                    <button class="btn-glow" style="padding: 10px; font-size: 0.6rem;" onclick="switchArena('tabela')">CLASSIFICAÇÃO</button>
                    <button class="btn-glow" style="padding: 10px; font-size: 0.6rem;" onclick="switchArena('jogos')">JOGOS</button>
                    <button id="btn-manage" class="btn-glow hidden" style="padding: 10px; font-size: 0.6rem; background: #1a1a1a; color: #fff;" onclick="switchArena('manage')">GERENCIAR</button>
                </div>
                <div id="arena-content"></div>
            </div>
        </main>

        <div id="chat-wrapper">
            <div id="chat-box">
                <div style="padding: 15px; border-bottom: 1px solid var(--glass); font-weight: 800; color: var(--primary);">CHAT GLOBAL</div>
                <div id="chat-msgs" style="flex:1; overflow-y:auto; padding: 15px; font-size: 0.8rem;"></div>
                <div style="padding: 10px; display:flex; gap:5px;">
                    <input type="text" id="chat-input" placeholder="Mensagem..." style="margin:0; flex:1; background: #000; border: none;">
                    <button onclick="sendMsg()" style="background:var(--primary); border:none; padding:10px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <div id="chat-bubble" onclick="toggleChat()"><i class="fas fa-comments"></i></div>
        </div>

        <div id="modal-settings" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:40px;">
            <h2 style="color:var(--primary); margin-bottom:30px;">CONFIGURAÇÕES</h2>
            <label>NOME DE EXIBIÇÃO:</label>
            <input type="text" id="set-nick">
            <label>URL DA FOTO:</label>
            <input type="text" id="set-foto" placeholder="Link da imagem">
            <button class="btn-glow" onclick="saveSettings()">SALVAR ALTERAÇÕES</button>
            <button class="btn-glow" style="margin-top:15px; background:#222; color:#fff;" onclick="closeSettings()">VOLTAR</button>
            <button class="btn-glow" style="margin-top:40px; background:var(--danger); color:#fff;" onclick="doLogout()">SAIR DA CONTA</button>
        </div>

        <div id="modal-profile" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:40px; text-align: center;">
            <div id="prof-avatar" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); margin: 0 auto 20px; background-size:cover;"></div>
            <h2 id="prof-nick" style="color:var(--primary);"></h2>
            <div id="prof-stats" class="card" style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            <button class="btn-glow" style="margin-top:20px;" onclick="closeProfile()">FECHAR</button>
        </div>

        <div id="overlay-sorteio" class="hidden">
            <div class="ball"></div>
            <h2 style="margin-top: 20px; letter-spacing: 5px;">SORTEANDO...</h2>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-users"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
