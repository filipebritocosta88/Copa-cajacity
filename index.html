<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa CajaCity | Pro League</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; --gold: #f9e295;
            --bg: #010204; --card: #0d0f14;
            --neon-blue: #00f2ff; --divine-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03); --text: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- LOGO ANIMADA --- */
        .header-brand { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid var(--divine-green); }
        .brand-top { font-size: 0.6rem; letter-spacing: 10px; color: var(--primary); font-weight: 800; }
        .brand-mid { font-size: 2.2rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(0,242,255,0.4)); }
        .brand-bottom { font-size: 0.6rem; color: var(--neon-blue); margin-top: 4px; font-family: monospace; }

        /* --- INPUTS & BUTTONS --- */
        input, select { 
            width: 100%; background: #080a0d; border: 1px solid rgba(0,242,255,0.2); 
            padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        .btn-glow { 
            background: linear-gradient(135deg, var(--primary), #8a6d3b); border:none; padding: 16px; border-radius: 12px; width: 100%; 
            font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(212,175,55,0.3);
        }

        /* --- LOBBY & CARDS --- */
        main { height: calc(100vh - 170px); overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass); position: relative; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* --- CHAVEAMENTO MATA-MATA --- */
        .bracket-match { background: #111; border: 1px solid var(--divine-green); border-radius: 12px; margin-bottom: 15px; padding: 10px; position: relative; }
        .team-line { display: flex; justify-content: space-between; align-items: center; padding: 6px; font-size: 0.85rem; }
        .team-line img { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
        .winner { color: var(--divine-green); font-weight: 800; text-shadow: 0 0 5px var(--divine-green); }

        /* --- PLACAR MODERNO --- */
        .score-ui { display: flex; align-items: center; gap: 10px; background: #000; padding: 5px 12px; border-radius: 30px; border: 1px solid var(--neon-blue); }
        .score-ui button { background: none; border: none; color: var(--neon-blue); font-size: 1.2rem; cursor: pointer; }
        .score-ui span { font-weight: 900; font-size: 1.3rem; min-width: 40px; text-align: center; }

        /* --- CHAT MODERNO --- */
        #chat-window { position: fixed; bottom: 95px; right: 20px; width: 320px; height: 0; background: rgba(13, 15, 20, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--neon-blue); border-radius: 20px; transition: 0.4s; opacity: 0; pointer-events: none; z-index: 1000; display: flex; flex-direction: column; }
        #chat-window.open { height: 450px; opacity: 1; pointer-events: all; }
        .msg-bubble { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--neon-blue); }

        /* --- NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--divine-green); }
        .nav-link { color: #555; font-size: 0.65rem; font-weight: 800; text-align: center; }
        .nav-link.active { color: var(--neon-blue); }
        .nav-link i { font-size: 1.6rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="header-brand">
                <div class="brand-top">COPA</div>
                <div class="brand-mid">CAJACITY</div>
            </div>
            <div style="margin-top: 50px;">
                <input type="email" id="l-email" placeholder="E-mail de Atleta">
                <input type="password" id="l-pass" placeholder="Sua Senha">
                <button class="btn-glow" onclick="doLogin()">ACESSAR ARENA</button>
                <p onclick="toggleAuth('reg')" style="text-align: center; margin-top: 25px; color: var(--neon-blue);">AINDA NÃO TENHO CONTA</p>
            </div>
        </div>
        <div id="screen-reg" class="hidden" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="color:var(--primary); text-align: center;">NOVO REGISTRO</h2>
            <input type="text" id="r-nick" placeholder="Seu Nick">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha">
            <button class="btn-glow" onclick="doRegister()">FINALIZAR CONTA</button>
            <p onclick="toggleAuth('login')" style="text-align: center; margin-top: 20px;">VOLTAR</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header style="padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000;">
            <div class="header-brand" style="border:none; padding:0; text-align: left;">
                <div class="brand-top" style="font-size: 0.4rem; letter-spacing: 4px;">COPA</div>
                <div class="brand-mid" style="font-size: 1.4rem;">CAJACITY</div>
                <div id="live-clock" class="brand-bottom"></div>
            </div>
            <div id="u-avatar" onclick="openSettings()" style="width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--neon-blue); background-size: cover; background-position: center;"></div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card" style="border: 1px solid var(--primary);">
                    <h4 style="color:var(--primary); margin-bottom: 15px;">CRIAR NOVO TORNEIO</h4>
                    <input type="text" id="c-nome" placeholder="Nome do Campeonato">
                    <select id="c-tipo">
                        <option value="liga">PONTOS CORRIDOS (TABELA)</option>
                        <option value="mata">MATA-MATA (CHAVEAMENTO)</option>
                    </select>
                    <button class="btn-glow" onclick="createCopa()">START</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-header"></div>
                <div style="display: flex; gap: 8px; margin: 15px 0;">
                    <button class="btn-glow" style="padding: 10px; font-size: 0.65rem;" onclick="switchArena('tabela')">RESUMO</button>
                    <button class="btn-glow" style="padding: 10px; font-size: 0.65rem;" onclick="switchArena('jogos')">CONFRONTOS</button>
                    <button id="btn-manage" class="btn-glow hidden" style="padding: 10px; font-size: 0.65rem; background:#111; color:#fff;" onclick="switchArena('manage')">GERIR</button>
                </div>
                <div id="arena-content"></div>
            </div>
        </main>

        <div id="chat-window">
            <div style="padding: 15px; border-bottom: 1px solid var(--neon-blue); font-weight: 800; color: var(--neon-blue); background: #111;">CHAT AO VIVO</div>
            <div id="chat-msgs" style="flex:1; overflow-y:auto; padding: 15px;"></div>
            <div style="padding: 12px; background: #000; display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Mensagem..." style="margin:0; flex:1;">
                <button onclick="sendMsg()" style="background:var(--neon-blue); border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div onclick="document.getElementById('chat-window').classList.toggle('open')" style="position:fixed; bottom:95px; right:20px; width:60px; height:60px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; box-shadow: 0 5px 20px var(--primary); z-index:1001;"><i class="fas fa-comments"></i></div>

        <div id="modal-settings" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px;">
            <h2 style="color:var(--primary); margin-bottom:30px;">MEU PERFIL</h2>
            <input type="text" id="set-nick" placeholder="Nick">
            <input type="text" id="set-foto" placeholder="URL Foto Avatar">
            <button class="btn-glow" onclick="saveSettings()">SALVAR</button>
            <button class="btn-glow" style="margin-top:15px; background:#111; color:#fff;" onclick="closeSettings()">VOLTAR</button>
            <button class="btn-glow" style="margin-top:40px; background:#400; color:#fff;" onclick="doLogout()">SAIR</button>
        </div>

        <div id="modal-profile" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px; text-align: center;">
            <div id="prof-avatar" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--neon-blue); margin: 0 auto 20px; background-size:cover; background-position:center;"></div>
            <h2 id="prof-nick" style="color:var(--primary);"></h2>
            <div id="prof-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;"></div>
            <button class="btn-glow" style="margin-top:25px;" onclick="document.getElementById('modal-profile').classList.add('hidden')">FECHAR</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-home"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
