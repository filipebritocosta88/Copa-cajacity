<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa CajaCity | Pro League</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #d4af37; --bg: #010203; --card: #0a0c10;
            --neon-blue: #00d4ff; --divine-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.05); --text: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* HEADER & LOGO */
        .header-brand { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid var(--divine-green); }
        .brand-top { font-size: 0.6rem; letter-spacing: 8px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .brand-mid { font-size: 2.1rem; font-weight: 900; background: linear-gradient(135deg, #fff, var(--primary), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.9; }
        .brand-bottom { font-size: 0.6rem; color: var(--neon-blue); margin-top: 5px; font-family: monospace; }

        /* UI ELEMENTS */
        main { height: calc(100vh - 175px); overflow-y: auto; padding: 15px; scrollbar-width: none; scroll-behavior: smooth; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(0,212,255,0.1); position: relative; transition: 0.3s; }
        .card:active { transform: scale(0.98); }
        
        input, select { 
            width: 100%; background: #000; border: 1px solid var(--divine-green); 
            padding: 14px; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none;
        }
        .btn-glow { 
            background: linear-gradient(135deg, #8a6d3b, var(--primary)); border:none; padding: 16px; border-radius: 10px; width: 100%; 
            font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(212,175,55,0.2);
        }
        .btn-secondary { background: #111; color: #fff; border: 1px solid var(--neon-blue); padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; }

        /* ARENA & TABLES */
        .match-card { background: #000; border: 1px solid var(--divine-green); border-radius: 12px; margin-bottom: 10px; padding: 12px; animation: fadeInUp 0.5s; }
        .match-team { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .match-team img { width: 28px; height: 28px; object-fit: contain; margin-right: 10px; }
        .team-info { display: flex; align-items: center; flex: 1; }
        .team-names { display: flex; flex-direction: column; }
        .team-names b { font-size: 0.9rem; color: #fff; }
        .team-names span { font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; }
        .score-input { width: 50px; background: #111; border: 1px solid var(--neon-blue); color: #fff; text-align: center; border-radius: 8px; padding: 8px; font-weight: 800; font-size: 1.1rem; }

        /* PODIUM & HISTORY */
        .podium-box { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin: 10px 0 25px; height: 100px; }
        .podium-item { width: 80px; background: #111; border-radius: 10px 10px 0 0; text-align: center; position: relative; border: 1px solid var(--glass); display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 5px; }
        .podium-1 { height: 90px; border-color: var(--primary); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .podium-2 { height: 70px; border-color: #aaa; }
        .podium-3 { height: 50px; border-color: #cd7f32; }
        .podium-name { font-size: 0.6rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }

        /* CHAT FLUIDO */
        #chat-window { position: fixed; bottom: 95px; right: 20px; width: 320px; height: 0; background: rgba(10,12,16,0.98); backdrop-filter: blur(20px); border: 1px solid var(--neon-blue); border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; z-index: 1000; display: flex; flex-direction: column; }
        #chat-window.open { height: 450px; opacity: 1; pointer-events: all; }
        .chat-msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--neon-blue); animation: slideInLeft 0.3s; }
        .chat-msg b { color: var(--primary); display: block; font-size: 0.7rem; margin-bottom: 2px; }

        /* CELEBRATION MODAL */
        #champion-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .champ-card { text-align: center; animation: zoomInUp 1s; }
        .champ-shield { width: 120px; height: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--primary)); }

        /* NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--divine-green); z-index: 100; }
        .nav-link { color: #555; font-size: 0.6rem; font-weight: 800; text-align: center; transition: 0.3s; }
        .nav-link.active { color: var(--neon-blue); transform: translateY(-5px); }
        .nav-link i { font-size: 1.5rem; display: block; margin-bottom: 4px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="champion-overlay" class="hidden">
        <div class="champ-card">
            <h1 style="color:var(--primary); font-size: 2rem; margin-bottom: 10px;">🏆 CAMPEÃO 🏆</h1>
            <img id="champ-img" src="" class="champ-shield">
            <h2 id="champ-team" style="font-size: 1.8rem;">---</h2>
            <p id="champ-player" style="color:var(--neon-blue); font-weight: 800;">---</p>
            <button class="btn-glow" style="margin-top: 30px; width: 200px;" onclick="closeChampion()">FECHAR</button>
        </div>
    </div>

    <div id="auth-area">
        <div id="screen-login" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="header-brand">
                <div class="brand-top">COPA</div>
                <div class="brand-mid">CAJACITY</div>
            </div>
            <div style="margin-top: 40px;">
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ENTRAR NA ARENA</button>
                <p onclick="toggleAuth('reg')" style="text-align: center; margin-top: 25px; color: var(--neon-blue);">CRIAR NOVA CONTA</p>
            </div>
        </div>
        <div id="screen-reg" class="hidden" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="color:var(--primary); text-align: center; margin-bottom: 20px;">NOVO CADASTRO</h2>
            <input type="text" id="r-nick" placeholder="Nome / Nick">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha">
            <button class="btn-glow" onclick="doRegister()">FINALIZAR REGISTRO</button>
            <p onclick="toggleAuth('login')" style="text-align: center; margin-top: 20px;">VOLTAR PARA LOGIN</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header style="padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000;">
            <div class="header-brand" style="border:none; padding:0; text-align: left;">
                <div class="brand-top" style="font-size: 0.4rem; letter-spacing: 3px;">COPA</div>
                <div class="brand-mid" style="font-size: 1.2rem;">CAJACITY</div>
                <div id="live-clock" class="brand-bottom"></div>
            </div>
            <div id="u-avatar" onclick="openSettings()" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-blue); background-size: cover; background-position: center; cursor: pointer;"></div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div id="podium-area"></div>
                <h4 style="color:var(--primary); margin: 20px 0 10px; font-size: 0.8rem; letter-spacing: 2px;">JOGADORES NA ARENA</h4>
                <div id="lobby-list"></div>
                <h4 style="color:var(--primary); margin: 25px 0 10px; font-size: 0.8rem; letter-spacing: 2px;">HISTÓRICO DE COPAS</h4>
                <div id="history-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div id="setup-copa" class="card">
                    <h4 style="color:var(--primary); margin-bottom:12px">CRIAR CAMPEONATO</h4>
                    <div id="step-1">
                        <input type="number" id="c-qtd" placeholder="Qtd. de Times (Ex: 8, 16, 20)">
                        <button class="btn-glow" onclick="nextStep(2)">PRÓXIMO</button>
                    </div>
                    <div id="step-2" class="hidden">
                        <input type="text" id="c-nome" placeholder="Nome do Torneio">
                        <select id="c-tipo">
                            <option value="mata">MATA-MATA</option>
                            <option value="liga">PONTOS CORRIDOS</option>
                        </select>
                        <select id="c-liga">
                            <option value="br">BRASILEIRÃO SÉRIE A</option>
                            <option value="euro">CHAMPIONS LEAGUE</option>
                        </select>
                        <button class="btn-glow" onclick="createCopa()">LANÇAR COPA</button>
                    </div>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-header"></div>
                <div style="display:flex; gap:8px; margin: 15px 0;">
                    <button class="btn-glow" style="padding:10px; font-size:0.65rem;" onclick="switchArena('tabela')">QUADRO</button>
                    <button class="btn-glow" style="padding:10px; font-size:0.65rem;" onclick="switchArena('jogos')">PLACAR</button>
                    <button id="btn-manage" class="btn-glow hidden" style="padding:10px; font-size:0.65rem; background:#111; color:#fff;" onclick="switchArena('manage')">GESTÃO</button>
                </div>
                <div id="arena-content"></div>
            </div>
        </main>

        <div id="chat-window">
            <div style="padding: 15px; border-bottom: 1px solid var(--neon-blue); font-weight: 800; color: var(--neon-blue); background: #111; display:flex; justify-content:space-between;">
                <span>CAJACITY MESSENGER</span>
                <i class="fas fa-times" onclick="document.getElementById('chat-window').classList.remove('open')"></i>
            </div>
            <div id="chat-msgs" style="flex:1; overflow-y:auto; padding: 12px; scrollbar-width: none;"></div>
            <div style="padding: 10px; display:flex; gap:8px; background: #000;">
                <input type="text" id="chat-input" placeholder="Sua mensagem..." style="margin:0; flex:1;">
                <button onclick="sendMsg()" style="background:var(--neon-blue); border:none; padding:10px 15px; border-radius:10px; color:#000;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div onclick="document.getElementById('chat-window').classList.toggle('open')" style="position:fixed; bottom:95px; right:20px; width:55px; height:55px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; z-index:1001; box-shadow: 0 0 20px var(--primary); cursor: pointer;"><i class="fas fa-comments" style="font-size: 1.4rem;"></i></div>

        <div id="modal-settings" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px;">
            <h3 style="color:var(--primary); margin-bottom:20px;">MEU PERFIL</h3>
            <input type="text" id="set-nick" placeholder="Nick">
            <input type="text" id="set-foto" placeholder="URL da Foto">
            <button class="btn-glow" onclick="saveSettings()">SALVAR ALTERAÇÕES</button>
            <button class="btn-glow" style="margin-top:10px; background:#222; color:#fff;" onclick="closeSettings()">VOLTAR</button>
            <button class="btn-glow" style="margin-top:30px; background:#500; color:#fff;" onclick="doLogout()">DESLOGAR</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-home"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

            apiKey: "AIzaSyBHdQFLQ3V4BjdYRt5J6zq1H86jFJrotic",
            authDomain: "cajacity-cup.firebaseapp.com",

            messagingSenderId: "922666284836",

        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="app.js"></script>
</body>
</html>
