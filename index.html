<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metasboard | Copa Cajacity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg-dark: #0f1218;
            --bg-card: #1a1f26; --text-light: #f5f5f5; --accent: #ff0055;
            --gradient: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); padding-bottom: 80px; overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(26, 31, 38, 0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0e13; color: white; font-size: 1rem; }
        .btn-primary { background: var(--gradient); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-sec { background: #252a33; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .hidden { display: none !important; }
        .status-on { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--primary); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1f26; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .match-history-item { font-size: 0.8rem; background: #111; padding: 10px; border-radius: 8px; margin-top: 5px; border-left: 2px solid var(--secondary); }
    </style>
</head>
<body>

    <div id="view-auth" class="container">
        <div style="text-align:center; margin: 60px 0 40px;">
            <h1 class="logo" style="font-size: 2.8rem;">Cajacity</h1>
            <p style="color: #666; font-size: 0.7rem; letter-spacing: 4px;">METASBOARD v2.0</p>
        </div>
        <div id="box-login" class="card">
            <h3 style="margin-bottom:20px; text-align: center;">LOGIN</h3>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-primary" id="btn-entrar">ENTRAR NA ARENA</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:0.8rem; text-align:center; color:var(--primary); cursor:pointer">Não tem conta? <b>Cadastre Nick</b></p>
        </div>
        <div id="box-register" class="card hidden">
            <h3 style="margin-bottom:20px; text-align: center;">NOVO NICK</h3>
            <input type="text" id="reg-nick" placeholder="Nick de Jogador">
            <input type="email" id="reg-email" placeholder="Seu E-mail">
            <input type="password" id="reg-pass" placeholder="Senha (mín. 6 dígitos)">
            <button class="btn-primary" id="btn-registrar">CRIAR CONTA</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:0.8rem; text-align:center; color:var(--primary); cursor:pointer">Já tem conta? <b>Logar</b></p>
        </div>
    </div>

    <div id="view-dash" class="hidden">
        <header>
            <div class="logo">Metasboard</div>
            <div id="user-status-header"><span class="status-on"></span> <span id="user-name">...</span></div>
        </header>
        <div class="container">
            <div class="card" style="border-left-color: var(--secondary)">
                <h4><i class="fas fa-users"></i> Lobby Online</h4>
                <div id="lobby-list" style="margin-top:10px; max-height: 150px; overflow-y: auto;">
                    <p style="font-size: 0.8rem; color: #666;">Buscando jogadores...</p>
                </div>
            </div>

            <div class="card">
                <h4>Novo Campeonato</h4>
                <input type="text" id="camp-name" placeholder="Nome do Torneio" style="margin-top:10px">
                <select id="camp-game">
                    <option value="PES 2018">PES 2018</option>
                    <option value="EA Sports FC 24">EA Sports FC 24</option>
                </select>
                <button class="btn-primary" onclick="createCamp()">Criar</button>
            </div>

            <h4>Meus Torneios</h4>
            <div id="lista-camps"></div>
        </div>
    </div>

    <div id="view-arena" class="hidden">
        <header>
            <div class="logo" onclick="showView('view-dash')" style="cursor:pointer">← Voltar</div>
            <h4 id="arena-title">Arena</h4>
        </header>
        <div class="container">
            <div id="tab-table">
                <div class="card">
                    <h4>Classificação</h4>
                    <div id="arena-players" style="margin-top:10px"></div>
                </div>
                <div class="card" style="border-left-color: var(--accent)">
                    <h4>Histórico de Partidas Detalhado</h4>
                    <div id="arena-history"></div>
                </div>
            </div>
        </div>
    </div>

    <nav id="main-nav" class="bottom-nav hidden">
        <div class="nav-item active" onclick="showView('view-dash')"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><br>Sair</div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
