<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metasboard - Gestão de Partidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --text-main: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -1px;
        }

        /* Seção de Entrada de Resultados */
        .result-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .match-input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .player-field {
            flex: 1;
            min-width: 150px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .vs {
            font-weight: bold;
            color: #999;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        /* Tabela de Classificação */
        .board-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px;
            border-bottom: 2px solid #eee;
            color: var(--primary);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .rank-pos {
            font-weight: 600;
            color: var(--accent);
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>METASBOARD</h1>
        <p>Acompanhamento Prático de Resultados</p>
    </header>

    <section class="result-panel">
        <h3>Registrar Nova Partida</h3>
        <div class="match-input-row">
            <div class="player-field">
                <input type="text" id="p1-name" placeholder="Jogador 1">
                <input type="number" id="p1-score" placeholder="Gols" min="0">
            </div>
            
            <div class="vs">VS</div>

            <div class="player-field">
                <input type="text" id="p2-name" placeholder="Jogador 2">
                <input type="number" id="p2-score" placeholder="Gols" min="0">
            </div>
        </div>
        <button onclick="registrarPartida()">Salvar Resultado</button>
    </section>

    <section class="board-panel">
        <h3>Classificação Geral</h3>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jogador</th>
                    <th>V</th>
                    <th>E</th>
                    <th>D</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                </tbody>
        </table>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
