<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa Cajacity | Pro Arena</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg: #05070a;
            --card: #0f1217; --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff; --text-dim: #8a8d91;
            --grad: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- AUTH --- */
        .auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; background: radial-gradient(circle at top right, #112211 0%, #05070a 100%); }
        .brand-logo { font-size: 3rem; font-weight: 800; letter-spacing: -3px; text-align: center; line-height: 0.9; margin-bottom: 40px; }
        .brand-logo span { color: var(--primary); text-shadow: 0 0 20px rgba(0,255,136,0.4); }

        /* --- LAYOUT --- */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,7,10,0.8); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; border-bottom: 1px solid var(--glass); }
        .user-trigger { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--glass); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--grad); background-size: cover; border: 2px solid #222; }

        /* --- SIDEBAR --- */
        #sidebar { position: fixed; top:0; right:-100%; width: 85%; height: 100%; background: var(--card); z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px 25px; border-left: 1px solid var(--glass); box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        #sidebar.active { right: 0; }

        /* --- CONTENT --- */
        main { height: calc(100vh - 165px); overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input, select, textarea { width: 100%; background: #161a20; border: 1px solid #2a2f36; padding: 16px; border-radius: 14px; color: #fff; font-size: 1rem; margin-bottom: 12px; outline: none; }
        .btn-glow { background: var(--grad); border:none; padding: 18px; border-radius: 16px; width: 100%; font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,255,136,0.2); }

        /* --- CHAT EVOLUÍDO --- */
        #chat-window { position: fixed; bottom: 95px; left: 0; width: 100%; height: 80vh; background: var(--card); z-index: 101; display: none; flex-direction: column; border-radius: 30px 30px 0 0; border-top: 1px solid var(--primary); }
        #chat-header { padding: 20px; border-bottom: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; }
        #chat-msgs { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 85%; position: relative; }
        .msg-info { display: flex; justify-content: space-between; font-size: 0.65rem; margin-bottom: 4px; font-weight: 700; }
        .msg-time { opacity: 0.5; font-weight: 400; margin-left: 8px; }
        
        .emoji-bar { display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; background: rgba(0,0,0,0.2); }
        .emoji-item { font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.3); }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(15,18,23,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); padding-bottom: 15px; z-index:90; }
        .nav-tab { color: #444; text-align: center; font-size: 0.6rem; font-weight: 800; transition: 0.3s; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab i { font-size: 1.5rem; display: block; margin-bottom: 4px; }

        /* --- TABELA PROFISSIONAL --- */
        .live-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .live-table th { padding: 10px; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; text-align: center; }
        .live-table tr { background: rgba(255,255,255,0.02); }
        .live-table td { padding: 15px 10px; text-align: center; first-child { border-radius: 15px 0 0 15px; } last-child { border-radius: 0 15px 15px 0; } }
        .pos-num { width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; background: #222; border-radius: 50%; font-weight: 800; border: 1px solid var(--glass); }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="login-screen" class="auth-screen">
            <h1 class="brand-logo">COPA<br><span>CAJACITY</span></h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-pass" placeholder="Senha">
            <button class="btn-glow" onclick="doLogin()">ENTRAR NA ARENA</button>
            <p onclick="toggleAuth('reg')" style="text-align:center; margin-top:25px; color:var(--text-dim)">Primeira vez? <span style="color:var(--primary)">Criar Nick</span></p>
        </div>

        <div id="reg-screen" class="auth-screen hidden">
            <h1 class="brand-logo">COPA<br><span>CAJACITY</span></h1>
            <input type="text" id="r-nick" placeholder="Seu Nick de Jogador">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha (mín. 6)">
            <button class="btn-glow" onclick="doRegister()">CRIAR CONTA</button>
            <p onclick="toggleAuth('login')" style="text-align:center; margin-top:25px; color:var(--text-dim)">Já tem conta? <span style="color:var(--primary)">Voltar</span></p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header>
            <div style="font-weight: 800; letter-spacing: -1px;">COPA <span style="color:var(--primary)">CAJACITY</span></div>
            <div class="user-trigger" onclick="toggleSidebar(true)">
                <span id="user-nick-top" style="font-size: 0.75rem; font-weight: 700;">---</span>
                <div class="avatar" id="user-img-top"></div>
            </div>
        </header>

        <div id="sidebar">
            <div onclick="toggleSidebar(false)" style="font-size: 2rem; margin-bottom: 20px;">&times;</div>
            <div style="text-align: center; margin-bottom: 30px;">
                <div id="side-avatar" style="width: 80px; height: 80px; border-radius: 50%; background: var(--grad); margin: 0 auto 10px; border: 3px solid #222; background-size: cover;"></div>
                <h3 id="side-name">Jogador</h3>
            </div>
            <input type="text" id="upd-img" placeholder="URL da Foto">
            <input type="text" id="upd-nick" placeholder="Novo Nick">
            <button class="btn-glow" onclick="updateUser()">SALVAR</button>
            <button class="btn-glow" onclick="doLogout()" style="margin-top:20px; background:#1a1a1a; color:var(--secondary)">SAIR</button>
        </div>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <h3 style="margin-bottom: 20px;">Arena Online</h3>
                <div id="players-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h4>Nova Competição</h4>
                    <input type="text" id="c-nome" placeholder="Nome da Copa">
                    <select id="c-tipo">
                        <option value="liga">Pontos Corridos</option>
                        <option value="champions">Modo Champions League</option>
                    </select>
                    <textarea id="c-regras" placeholder="Regras Gerais..."></textarea>
                    <button class="btn-glow" onclick="createCopa()">LANÇAR COPA</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-view">
                    <p style="text-align:center; color:var(--text-dim); margin-top:50px">Selecione uma Copa para entrar na Arena.</p>
                </div>
            </div>
        </main>

        <div id="chat-window">
            <div id="chat-header">
                <span style="font-weight: 800;"><i class="fas fa-circle" style="color:var(--primary); font-size:0.6rem"></i> CHAT GLOBAL</span>
                <i class="fas fa-times" onclick="toggleChat(false)"></i>
            </div>
            <div id="chat-msgs"></div>
            <div class="emoji-bar">
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('⚽')">⚽</span>
                <span class="emoji-item" onclick="addEmoji('🏆')">🏆</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('🎮')">🎮</span>
                <span class="emoji-item" onclick="addEmoji('👏')">👏</span>
            </div>
            <div style="padding: 15px; display: flex; gap: 10px; background: #0a0c10;">
                <input type="text" id="chat-input" placeholder="Diga algo..." style="margin-bottom:0">
                <button onclick="sendMsg()" style="background:var(--primary); border:none; border-radius:12px; padding:0 18px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-tab active" onclick="navTo('lobby', this)"><i class="fas fa-users-viewfinder"></i>LOBBY</div>
            <div class="nav-tab" onclick="navTo('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-tab" onclick="navTo('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
            <div class="nav-tab" onclick="toggleChat(true)"><i class="fas fa-comments"></i>CHAT</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
