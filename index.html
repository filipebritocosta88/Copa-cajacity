<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa CajaCity | Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; --gold-dark: #8a6d3b;
            --bg: #030405; --card: #0d0f12;
            --neon-blue: #00d4ff; --divine-green: #006400;
            --glass: rgba(255, 255, 255, 0.03); --text: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- LOGO CAJACITY --- */
        .header-brand { text-align: center; padding: 15px 0; background: linear-gradient(to bottom, #000, transparent); }
        .brand-top { font-size: 0.7rem; letter-spacing: 8px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .brand-mid { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.8; }
        .brand-bottom { font-size: 0.6rem; color: var(--neon-blue); margin-top: 5px; font-family: monospace; }

        /* --- INPUTS PREMIUM --- */
        input, select { 
            width: 100%; background: #0a0c0f; border: 1px solid var(--divine-green); 
            padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 12px; outline: none;
            box-shadow: inset 0 0 10px rgba(0,212,255,0.05); transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,212,255,0.2); }

        /* --- UI --- */
        main { height: calc(100vh - 180px); overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--glass); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--divine-green); }
        .btn-glow { 
            background: linear-gradient(135deg, var(--gold-dark), var(--primary)); border:none; padding: 16px; border-radius: 12px; width: 100%; 
            font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        /* --- PLACAR SELECTOR --- */
        .score-control { display: flex; align-items: center; gap: 10px; background: #000; padding: 5px 15px; border-radius: 30px; border: 1px solid var(--neon-blue); }
        .score-btn { background: none; border: none; color: var(--primary); font-size: 1.2rem; cursor: pointer; padding: 5px; }
        .score-val { font-size: 1.4rem; font-weight: 800; min-width: 25px; text-align: center; }

        /* --- MATA MATA --- */
        .bracket { display: flex; flex-direction: column; gap: 20px; align-items: center; padding: 20px 0; }
        .bracket-match { width: 100%; max-width: 280px; background: #111; border-radius: 10px; border: 1px solid var(--divine-green); padding: 10px; }
        .bracket-team { display: flex; justify-content: space-between; padding: 5px; font-size: 0.8rem; }
        .winner { color: var(--primary); font-weight: 800; }

        /* --- NAVIGATION --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #050505; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--divine-green); z-index: 100; }
        .nav-link { color: #333; font-size: 0.65rem; font-weight: 800; text-align: center; transition: 0.3s; }
        .nav-link.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* --- CHAT --- */
        #chat-box { position: fixed; bottom: 100px; right: 20px; width: 300px; height: 0; background: #0d0f12; border: 1px solid var(--neon-blue); border-radius: 20px; transition: 0.4s; opacity: 0; pointer-events: none; display: flex; flex-direction: column; z-index: 1000; }
        #chat-box.open { height: 400px; opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <div class="header-brand">
                <div class="brand-top">COPA</div>
                <div class="brand-mid">CAJACITY</div>
            </div>
            <div style="margin-top: 40px;">
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ENTRAR NO CAMPO</button>
                <p onclick="toggleAuth('reg')" style="text-align: center; margin-top: 20px; color: var(--neon-blue); font-size: 0.8rem;">CRIAR NOVA CONTA</p>
            </div>
        </div>
        <div id="screen-reg" class="hidden" style="padding: 40px; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="color:var(--primary); text-align: center; margin-bottom: 20px;">REGISTRO</h2>
            <input type="text" id="r-nick" placeholder="Nick">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha">
            <button class="btn-glow" onclick="doRegister()">CADASTRAR ATLETA</button>
            <p onclick="toggleAuth('login')" style="text-align: center; margin-top: 20px;">VOLTAR</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header style="padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000;">
            <div class="header-brand" style="padding: 0; text-align: left;">
                <div class="brand-top" style="font-size: 0.4rem; letter-spacing: 3px;">COPA</div>
                <div class="brand-mid" style="font-size: 1.2rem;">CAJACITY</div>
                <div id="live-clock" class="brand-bottom"></div>
            </div>
            <div id="u-avatar" onclick="openSettings()" style="width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); background-size: cover; box-shadow: 0 0 10px var(--primary);"></div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h4 style="color:var(--primary); margin-bottom: 15px;">NOVO CAMPEONATO</h4>
                    <input type="text" id="c-nome" placeholder="Nome da Copa">
                    <select id="c-tipo">
                        <option value="liga">PONTOS CORRIDOS</option>
                        <option value="mata">MATA-MATA (CHAVEAMENTO)</option>
                    </select>
                    <button class="btn-glow" onclick="createCopa()">LANÇAR TORNEIO</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="arena-header" style="margin-bottom: 15px;"></div>
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button class="btn-glow" style="padding: 10px; font-size: 0.6rem;" onclick="switchArena('tabela')">TABELA</button>
                    <button class="btn-glow" style="padding: 10px; font-size: 0.6rem;" onclick="switchArena('jogos')">CONFRONTOS</button>
                    <button id="btn-manage" class="btn-glow hidden" style="padding: 10px; font-size: 0.6rem; background: #1a1a1a; color: #fff;" onclick="switchArena('manage')">GERIR</button>
                </div>
                <div id="arena-content"></div>
            </div>
        </main>

        <div id="chat-box">
            <div style="padding: 15px; border-bottom: 1px solid var(--divine-green); font-weight: 800; color: var(--neon-blue);">CHAT CAJACITY</div>
            <div id="chat-msgs" style="flex:1; overflow-y:auto; padding: 15px; font-size: 0.8rem;"></div>
            <div style="padding: 10px; display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Fala..." style="margin:0; flex:1; padding: 8px;">
                <button onclick="sendMsg()" style="background:var(--primary); border:none; padding:10px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div onclick="document.getElementById('chat-box').classList.toggle('open')" style="position:fixed; bottom:95px; right:20px; width:55px; height:55px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; font-size:1.3rem; z-index:1001; box-shadow: 0 0 20px var(--primary);"><i class="fas fa-comment"></i></div>

        <div id="modal-settings" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px;">
            <h2 style="color:var(--primary); margin-bottom:30px;">CONFIGURAÇÕES</h2>
            <input type="text" id="set-nick" placeholder="Nick">
            <input type="text" id="set-foto" placeholder="Link do Avatar (URL)">
            <button class="btn-glow" onclick="saveSettings()">SALVAR</button>
            <button class="btn-glow" style="margin-top:15px; background:#222; color:#fff;" onclick="closeSettings()">VOLTAR</button>
            <button class="btn-glow" style="margin-top:40px; background:#600; color:#fff;" onclick="doLogout()">SAIR DA CONTA</button>
        </div>

        <div id="modal-profile" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:2000; padding:40px; text-align: center;">
            <div id="prof-avatar" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--neon-blue); margin: 0 auto 20px; background-size:cover;"></div>
            <h2 id="prof-nick" style="color:var(--primary);"></h2>
            <div id="prof-stats" class="card" style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; background:#000;"></div>
            <button class="btn-glow" style="margin-top:20px;" onclick="document.getElementById('modal-profile').classList.add('hidden')">FECHAR</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-users"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
