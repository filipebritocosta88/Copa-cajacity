<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metasboard | Copa Cajacity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg: #05070a;
            --card: #0f1217; --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff; --text-dim: #8a8d91;
            --grad: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            --danger: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- HEADER & BRAND --- */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,7,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass); position: sticky; top:0; z-index:100; }
        .brand-area { line-height: 1; }
        .brand-logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -1px; }
        .brand-logo span { color: var(--primary); }
        .header-date { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        /* --- CONTAINERS --- */
        main { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass); position: relative; }
        .btn-glow { background: var(--grad); border:none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; margin-top: 5px; }
        
        /* --- AVATAR SELECTOR --- */
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; padding: 5px; }
        .avatar-opt { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; background-size: cover; }
        .avatar-opt.selected { border-color: var(--primary); transform: scale(1.1); }

        /* --- LOBBY & RANKING --- */
        .player-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 8px; }
        .trophy-gold { color: #ffd700; } .trophy-silver { color: #c0c0c0; } .trophy-bronze { color: #cd7f32; }

        /* --- ARENA CHAVEAMENTO --- */
        .arena-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .arena-nav button { flex: 1; padding: 10px; border-radius: 10px; background: var(--glass); border: 1px solid var(--glass); color: #fff; font-size: 0.7rem; font-weight: 700; }
        .arena-nav button.active { background: var(--primary); color: #000; }

        /* --- CHAT FLUTUANTE --- */
        #chat-wrapper { position: fixed; bottom: 90px; right: 15px; z-index: 1000; }
        #chat-bubble { width: 55px; height: 55px; background: var(--grad); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; box-shadow: 0 5px 20px rgba(0,255,136,0.3); cursor: pointer; position: relative; }
        #chat-box { width: 300px; height: 400px; background: var(--card); border: 1px solid var(--primary); border-radius: 20px; display: none; flex-direction: column; margin-bottom: 10px; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.8rem; }
        .chat-toggle-btns { display: flex; background: #000; border-radius: 10px; margin: 5px; padding: 2px; }
        .chat-toggle-btns button { flex: 1; background: none; border: none; color: #555; font-size: 0.6rem; padding: 5px; font-weight: 800; }
        .chat-toggle-btns button.active { background: var(--primary); color: #000; border-radius: 8px; }

        /* --- NAVIGATION --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0c10; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); }
        .nav-item { color: #444; text-align: center; font-size: 0.6rem; font-weight: 800; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }

        /* --- PRINT AREA --- */
        #print-zone { padding: 10px; background: var(--bg); }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" class="auth-screen">
            <h1 style="text-align:center; font-weight:800; font-size:2.5rem; letter-spacing:-2px">COPA<br><span style="color:var(--primary)">CAJACITY</span></h1>
            <div style="margin-top:30px">
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ACESSAR ARENA</button>
                <p onclick="toggleAuth('reg')" style="text-align:center; margin-top:20px; color:var(--text-dim); font-size:0.8rem">Novo jogador? <span style="color:var(--primary)">Criar Nick</span></p>
            </div>
        </div>
        <div id="screen-reg" class="auth-screen hidden">
            <h1 style="text-align:center; font-weight:800; font-size:2rem">CRIAR <span style="color:var(--primary)">CONTA</span></h1>
            <input type="text" id="r-nick" placeholder="Seu Nick">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="password" id="r-pass" placeholder="Senha (6+ dígitos)">
            <button class="btn-glow" onclick="doRegister()">CADASTRAR</button>
            <p onclick="toggleAuth('login')" style="text-align:center; margin-top:20px">Voltar para Login</p>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header>
            <div class="brand-area">
                <div class="brand-logo">COPA <span>CAJACITY</span></div>
                <div class="header-date" id="live-clock">--:--:--</div>
            </div>
            <div style="display:flex; gap:10px; align-items:center">
                <div id="top-nick" style="font-size:0.7rem; font-weight:800">Nick</div>
                <div id="top-avatar" onclick="openSettings()" style="width:35px; height:35px; border-radius:50%; background:var(--grad); cursor:pointer; background-size:cover; border:2px solid #222"></div>
            </div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div class="card" style="background: linear-gradient(to right, #1a1e24, #0f1217);">
                    <h4 style="color:var(--primary)"><i class="fas fa-crown"></i> Hall da Fama</h4>
                    <div id="hall-fame" style="margin-top:10px"></div>
                </div>
                <h4 style="margin:20px 0 10px">Jogadores na Arena</h4>
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h3 style="margin-bottom:15px">Novo Campeonato</h3>
                    <input type="text" id="c-nome" placeholder="Nome da Competição">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                        <div id="type-amistoso" class="card" onclick="selectType('amistoso')" style="margin:0; text-align:center; cursor:pointer; border:1px solid #333">
                            <i class="fas fa-handshake" style="font-size:1.5rem; color:var(--secondary)"></i><br><small>Amistoso</small>
                        </div>
                        <div id="type-liga" class="card" onclick="selectType('liga')" style="margin:0; text-align:center; cursor:pointer; border:2px solid var(--primary)">
                            <i class="fas fa-trophy" style="font-size:1.5rem; color:var(--primary)"></i><br><small>Liga</small>
                        </div>
                    </div>
                    <button class="btn-glow" onclick="createCopa()">LANÇAR TORNEIO</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="print-zone">
                    <div id="arena-header"></div>
                    <div class="arena-nav">
                        <button id="btn-tab-class" class="active" onclick="switchArena('class')">CLASSIFICAÇÃO</button>
                        <button id="btn-tab-jogos" onclick="switchArena('jogos')">JOGOS</button>
                        <button id="btn-tab-info" onclick="switchArena('info')">INFO/CONVIDAR</button>
                    </div>
                    <div id="arena-body"></div>
                </div>
                <button class="btn-glow" style="background:#222; color:#fff" onclick="saveAsImage()"><i class="fas fa-camera"></i> SALVAR PARA COMPARTILHAR</button>
            </div>
        </main>

        <div id="chat-wrapper">
            <div id="chat-box">
                <div class="chat-toggle-btns">
                    <button id="btn-chat-global" class="active" onclick="setChatMode('global')">GLOBAL</button>
                    <button id="btn-chat-copa" onclick="setChatMode('copa')">COPA</button>
                </div>
                <div id="chat-msgs"></div>
                <div style="padding:10px; display:flex; gap:5px">
                    <input type="text" id="chat-input" placeholder="Diga algo..." style="margin:0; font-size:0.7rem">
                    <button onclick="sendChatMsg()" style="background:var(--primary); border:none; padding:0 12px; border-radius:10px"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <div id="chat-bubble" onclick="toggleChatWindow()">
                <i class="fas fa-comment-dots"></i>
                <div id="chat-badge" class="hidden">0</div>
            </div>
        </div>

        <div id="modal-settings" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; overflow-y:auto">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h2>Perfil</h2>
                <i class="fas fa-times" onclick="closeSettings()" style="font-size:1.5rem"></i>
            </div>
            <div style="text-align:center; margin:20px 0">
                <div id="set-avatar-preview" style="width:100px; height:100px; border-radius:50%; background:var(--grad); margin:0 auto; background-size:cover"></div>
                <p style="margin-top:10px">Escolha seu Personagem:</p>
                <div class="avatar-grid" id="avatar-selector"></div>
            </div>
            <input type="text" id="set-nick" placeholder="Novo Nick">
            <button class="btn-glow" onclick="saveSettings()">ATUALIZAR PERFIL</button>
            <button onclick="doLogout()" style="width:100%; margin-top:20px; background:none; border:1px solid #333; color:var(--danger); padding:10px; border-radius:10px">SAIR DA CONTA</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="navTo('lobby', this)"><i class="fas fa-users-viewfinder"></i>LOBBY</div>
            <div class="nav-item" onclick="navTo('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-item" onclick="navTo('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
