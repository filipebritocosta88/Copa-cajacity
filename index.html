<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metasboard | Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg-dark: #0b0e11;
            --bg-card: #151921; --text: #f5f5f5; --accent: #ff0055;
            --grad: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Header & Perfil Expansível */
        header { padding: 15px 20px; background: #1a1f26; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar-circle { width: 35px; height: 35px; border-radius: 50%; background: var(--grad); border: 2px solid #333; overflow: hidden; }
        
        #side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: #1a1f26; z-index: 200; transition: 0.4s; padding: 40px 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #side-menu.active { right: 0; }

        /* Container Principal */
        .app-content { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2f3a; position: relative; overflow: hidden; }
        
        /* Sistema de Chat */
        #chat-window { position: fixed; bottom: 85px; right: 20px; width: 300px; height: 400px; background: #1a1f26; border-radius: 12px; border: 1px solid var(--primary); display: flex; flex-direction: column; z-index: 50; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; background: #252a33; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #000; }

        /* Navegação Inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a1f26; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; z-index: 150; }
        .nav-btn { color: #666; font-size: 1.2rem; cursor: pointer; transition: 0.3s; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn span { display: block; font-size: 0.6rem; margin-top: 4px; font-weight: bold; }

        /* Tabelas e Animações */
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: center; border-bottom: 1px solid #222; }
        tr { transition: transform 0.5s ease; }
        .live-tag { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #0b0e13; color: #fff; }
        .btn { background: var(--grad); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="view-auth" class="app-content">
        <div style="text-align: center; margin: 50px 0;">
            <h1 style="font-weight: 800; letter-spacing: 5px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">METASBOARD</h1>
        </div>
        <div class="card">
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn" id="btn-entrar">ENTRAR</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem" onclick="document.getElementById('view-auth').classList.add('hidden'); document.getElementById('view-reg').classList.remove('hidden')">Não tem Nick? Cadastre-se</p>
        </div>
    </div>

    <div id="view-reg" class="app-content hidden">
        <div class="card">
            <input type="text" id="reg-nick" placeholder="Seu Nick">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Senha">
            <button class="btn" id="btn-registrar">CRIAR CONTA</button>
        </div>
    </div>

    <div id="view-main" class="hidden">
        <header>
            <div style="font-weight: 800; font-size: 0.9rem;">METAS<span style="color:var(--primary)">BOARD</span></div>
            <div class="profile-trigger" onclick="toggleMenu(true)">
                <span id="display-nick" style="font-size:0.8rem; font-weight:600">---</span>
                <div class="avatar-circle" id="user-avatar"></div>
            </div>
        </header>

        <div id="side-menu">
            <div onclick="toggleMenu(false)" style="float:right; font-size:1.5rem">×</div>
            <h3 style="margin-bottom:20px">Meu Perfil</h3>
            <label>Alterar Nick:</label>
            <input type="text" id="edit-nick" placeholder="Novo Nick">
            <label>URL da Foto:</label>
            <input type="text" id="edit-photo" placeholder="Link da imagem">
            <button class="btn" onclick="updateProfile()" style="margin-top:10px">SALVAR ALTERAÇÕES</button>
            <button class="btn" onclick="logout()" style="margin-top:40px; background: #333; color: white;">SAIR DA CONTA</button>
        </div>

        <div class="app-content">
            <div id="tab-lobby" class="tab-content">
                <div class="card">
                    <h4><i class="fas fa-satellite"></i> Jogadores Online</h4>
                    <div id="lobby-users" style="margin-top:15px"></div>
                </div>
                
                <div class="card">
                    <h4><i class="fas fa-comments"></i> Chat Geral</h4>
                    <div id="messages" style="height: 200px; border: 1px solid #333; margin: 10px 0;"></div>
                    <div style="display:flex; gap:5px">
                        <input type="text" id="chat-input" placeholder="Mensagem...">
                        <button class="btn" style="width: 60px;" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="tab-comp" class="tab-content hidden">
                <div class="card">
                    <h4>Criar Campeonato</h4>
                    <input type="text" id="cp-name" placeholder="Nome da Competição">
                    <select id="cp-type">
                        <option value="liga">Pontos Corridos</option>
                        <option value="champions">Liga + Mata-Mata (Estilo Champions)</option>
                    </select>
                    <label>Número de Jogadores:</label>
                    <input type="number" id="cp-size" value="8">
                    <label>Regras do Host:</label>
                    <textarea id="cp-rules" placeholder="Ex: Proibido replay, 5 min de jogo..."></textarea>
                    <button class="btn" onclick="initComp()">LANÇAR COMPETIÇÃO</button>
                </div>
                <div id="my-competitions"></div>
            </div>

            <div id="arena-view" class="hidden">
                <div class="card">
                    <h2 id="arena-name" style="text-align:center; color:var(--primary)"></h2>
                    <p id="arena-rules-display" style="font-size:0.7rem; color:#888; text-align:center; margin-bottom:15px"></p>
                    
                    <div style="display:flex; gap:10px; margin-bottom:15px">
                        <button class="btn-sec" onclick="setArenaTab('table')">Tabela</button>
                        <button class="btn-sec" onclick="setArenaTab('matches')">Jogos</button>
                        <button id="host-panel-btn" class="btn-sec hidden" style="border-color:var(--accent)" onclick="setArenaTab('admin')">Host</button>
                    </div>

                    <div id="arena-table">
                        <table id="main-table">
                            <thead><tr><th>Pos</th><th>Nick</th><th>P</th><th>V</th><th>SG</th></tr></thead>
                            <tbody id="table-data"></tbody>
                        </table>
                    </div>

                    <div id="arena-matches" class="hidden"></div>

                    <div id="arena-admin" class="hidden">
                        <div id="invite-section">
                            <h5>Convidar Jogadores (Faltam: <span id="slots-count"></span>)</h5>
                            <div id="invite-pool"></div>
                        </div>
                        <div id="score-section" class="hidden">
                            <h5>Atualizar Placar</h5>
                            <select id="adm-m1"></select>
                            <input type="number" id="adm-g1" placeholder="Gols">
                            <input type="number" id="adm-g2" placeholder="Gols">
                            <select id="adm-m2"></select>
                            <button class="btn" onclick="submitScore()">PUBLICAR RESULTADO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-btn active" id="nav-lobby" onclick="switchTab('lobby')"><i class="fas fa-globe"></i><span>LOBBY</span></div>
            <div class="nav-btn" id="nav-comp" onclick="switchTab('comp')"><i class="fas fa-trophy"></i><span>COPAS</span></div>
            <div class="nav-btn" id="nav-matches" onclick="switchTab('matches')"><i class="fas fa-gamepad"></i><span>ARENA</span></div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
