<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metasboard | Copa Cajacity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --bg: #05070a;
            --card: #0f1217; --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff; --text-dim: #8a8d91;
            --grad: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            --danger: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* --- AUTH DESIGN --- */
        .auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; background: radial-gradient(circle at top right, #003311 0%, #05070a 100%); }
        .login-card { background: rgba(15, 18, 23, 0.8); padding: 30px; border-radius: 30px; border: 1px solid var(--glass); backdrop-filter: blur(10px); }
        
        /* --- HEADER --- */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,7,10,0.9); border-bottom: 1px solid var(--glass); position: sticky; top:0; z-index:100; }
        .top-avatar { width: 38px; height: 38px; border-radius: 50%; background-size: cover; border: 2px solid var(--primary); box-shadow: 0 0 10px rgba(0,255,136,0.3); }

        /* --- UI COMPONENTS --- */
        main { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--glass); transition: 0.3s; }
        .btn-glow { background: var(--grad); border:none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; color:#000; cursor:pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        input, select { width: 100%; background: #161a20; border: 1px solid #2a2f36; padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 10px; }

        /* --- SORTEIO ANIMADO --- */
        #sorteio-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sorteio-box { width: 150px; height: 150px; background: var(--grad); border-radius: 20px; animation: shake 0.5s infinite; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #000; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(-1deg); } 50% { transform: translate(-1px, 2px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

        /* --- CHAT EXPANSÍVEL --- */
        #chat-wrapper { position: fixed; bottom: 90px; right: 15px; z-index: 1000; }
        #chat-bubble { width: 55px; height: 55px; background: var(--grad); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; position: relative; }
        #chat-box { width: 320px; height: 450px; background: var(--card); border: 1px solid var(--primary); border-radius: 25px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; }
        .msg-line { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,0.05); max-width: 85%; }

        /* --- AVATAR GRID --- */
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; max-height: 250px; overflow-y: auto; }
        .av-item { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; background-size: cover; }
        .av-item.selected { border-color: var(--primary); transform: scale(1.1); }

        /* --- RANKING E HALL --- */
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.02); margin-bottom: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* --- NAVIGATION --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0c10; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); }
        .nav-link { color: #444; font-size: 0.65rem; font-weight: 800; text-align: center; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="auth-area">
        <div id="screen-login" class="auth-screen">
            <div class="login-card">
                <h1 style="text-align:center; letter-spacing:-2px; line-height:0.9">COPA<br><span style="color:var(--primary)">CAJACITY</span></h1>
                <p id="auth-time" style="text-align:center; font-size:0.7rem; color:var(--text-dim); margin:15px 0 25px"></p>
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-pass" placeholder="Senha">
                <button class="btn-glow" onclick="doLogin()">ENTRAR NO JOGO</button>
                <p onclick="toggleAuth('reg')" style="text-align:center; margin-top:20px; font-size:0.8rem">Novo jogador? <span style="color:var(--primary)">Criar Nick</span></p>
            </div>
        </div>
        <div id="screen-reg" class="auth-screen hidden">
            <div class="login-card">
                <h2 style="text-align:center; margin-bottom:20px">NOVO <span style="color:var(--primary)">CADASTRO</span></h2>
                <input type="text" id="r-nick" placeholder="Seu Nick">
                <input type="email" id="r-email" placeholder="E-mail">
                <input type="password" id="r-pass" placeholder="Senha (6 dígitos)">
                <button class="btn-glow" onclick="doRegister()">CRIAR CONTA</button>
                <p onclick="toggleAuth('login')" style="text-align:center; margin-top:20px">Já tenho conta</p>
            </div>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header>
            <div>
                <div style="font-weight: 800; font-size: 1rem;">METAS<span>BOARD</span></div>
                <div id="header-clock" style="font-size: 0.6rem; color: var(--text-dim); font-weight: 700;">--:--</div>
            </div>
            <div style="display:flex; align-items:center; gap:12px">
                <div id="user-nick-display" style="font-size:0.7rem; font-weight:800">Nick</div>
                <div class="top-avatar" id="user-avatar-display" onclick="openProfile()"></div>
            </div>
        </header>

        <main id="main-content">
            <div id="tab-lobby" class="page">
                <div class="card" style="background: linear-gradient(135deg, #0f1217 0%, #1a1e24 100%);">
                    <h4 style="color:var(--primary); margin-bottom:10px"><i class="fas fa-trophy"></i> HALL DA FAMA</h4>
                    <div id="hall-fame-list" style="display:flex; justify-content:space-around"></div>
                </div>
                <h4 style="margin:20px 0 10px">Jogadores Arena</h4>
                <div id="lobby-list"></div>
            </div>

            <div id="tab-copas" class="page hidden">
                <div class="card">
                    <h3 style="margin-bottom:15px">Novo Campeonato</h3>
                    <input type="text" id="c-nome" placeholder="Nome da Competição">
                    <select id="c-tipo">
                        <option value="liga">Pontos Corridos (Liga)</option>
                        <option value="mata">Mata-Mata (Oitavas/Quartas)</option>
                        <option value="misto">Liga + Mata-Mata</option>
                        <option value="amistoso">Amistoso (1 Jogo)</option>
                    </select>
                    <button class="btn-glow" onclick="createCopa()">GERAR COMPETIÇÃO</button>
                </div>
                <div id="copas-list"></div>
            </div>

            <div id="tab-arena" class="page hidden">
                <div id="print-area">
                    <div id="arena-header"></div>
                    <div id="arena-tabs-nav" style="display:flex; gap:5px; margin:15px 0">
                        <button class="btn-glow" style="padding:10px; font-size:0.6rem" onclick="switchArena('tabela')">TABELA</button>
                        <button class="btn-glow" style="padding:10px; font-size:0.6rem" onclick="switchArena('jogos')">JOGOS</button>
                        <button class="btn-glow" style="padding:10px; font-size:0.6rem" onclick="switchArena('convidar')">CONVIDAR</button>
                    </div>
                    <div id="arena-content"></div>
                </div>
                <button class="btn-glow" style="margin-top:20px; background:#111; color:#fff" onclick="takePrint()"><i class="fas fa-camera"></i> SALVAR RESULTADOS</button>
            </div>
        </main>

        <div id="chat-wrapper">
            <div id="chat-box">
                <div style="padding:15px; border-bottom:1px solid var(--glass); display:flex; justify-content:space-between; align-items:center">
                    <select id="chat-selector" style="width:auto; margin:0; padding:5px; font-size:0.7rem; background:none; border:none">
                        <option value="global">Chat Global</option>
                    </select>
                    <i class="fas fa-times" onclick="toggleChat()"></i>
                </div>
                <div id="chat-msgs"></div>
                <div style="padding:10px; display:flex; gap:5px">
                    <input type="text" id="chat-input" placeholder="Mensagem..." style="margin:0; font-size:0.8rem">
                    <button onclick="sendMsg()" style="background:var(--primary); border:none; padding:0 12px; border-radius:10px"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <div id="chat-bubble" onclick="toggleChat()">
                <i class="fas fa-comment-dots"></i>
                <div id="chat-badge" class="hidden">0</div>
            </div>
        </div>

        <div id="modal-profile" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:25px; overflow-y:auto">
            <div style="display:flex; justify-content:space-between">
                <h2>Meu Perfil</h2>
                <i class="fas fa-times" onclick="closeProfile()" style="font-size:1.5rem"></i>
            </div>
            <div style="text-align:center; margin:20px 0">
                <div id="profile-preview" style="width:100px; height:100px; border-radius:50%; margin:0 auto; background-size:cover; border:3px solid var(--primary)"></div>
                <p style="margin-top:10px; font-size:0.8rem">Escolha seu Avatar:</p>
                <div class="avatar-grid" id="avatar-list"></div>
            </div>
            <input type="text" id="new-nick" placeholder="Mudar Nick">
            <button class="btn-glow" onclick="saveProfile()">SALVAR MUDANÇAS</button>
            <button onclick="doLogout()" style="width:100%; margin-top:30px; background:none; border:1px solid #333; color:var(--danger); padding:10px; border-radius:10px">LOGOUT</button>
        </div>

        <div id="sorteio-overlay" class="hidden">
            <div class="sorteio-box"><i class="fas fa-box-open"></i></div>
            <h2 style="margin-top:20px">SORTEANDO CONFRONTOS...</h2>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="changeTab('lobby', this)"><i class="fas fa-users"></i>LOBBY</div>
            <div class="nav-link" onclick="changeTab('copas', this)"><i class="fas fa-trophy"></i>COPAS</div>
            <div class="nav-link" onclick="changeTab('arena', this)"><i class="fas fa-gamepad"></i>ARENA</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    </script>
    <script src="app.js"></script>
</body>
</html>
